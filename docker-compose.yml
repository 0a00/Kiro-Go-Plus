services:
  kiro-go:
    build: .
    init: true
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${KIRO_PORT:-8080}:8080"
      # Kiro hosted SSO redirects the browser to localhost:3128.
      - "127.0.0.1:3128:3128"
    volumes:
      - ./data:/app/data
    environment:
      - CONFIG_PATH=/app/data/config.json
      - KIRO_LISTEN_HOST=0.0.0.0
      - KIRO_LISTEN_PORT=8080
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HEALTHCHECK_PORT=8080
      - ALLOW_INSECURE_PUBLIC_BIND=${ALLOW_INSECURE_PUBLIC_BIND:-false}
      - ALLOW_UNAUTHENTICATED_API=${ALLOW_UNAUTHENTICATED_API:-false}
      - KIRO_MASTER_KEY=${KIRO_MASTER_KEY:-}
      - KIRO_SSO_CALLBACK_BIND=0.0.0.0
      - KIRO_PROFILE_REGIONS=${KIRO_PROFILE_REGIONS:-us-east-1,eu-central-1}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:$${HEALTHCHECK_PORT:-8080}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 35s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped
